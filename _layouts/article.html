<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: page.title }}">
  <title>{{ page.title }} | single5240</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1e252b;
      --muted: #63707a;
      --line: #d9e1e7;
      --paper: #f8faf7;
      --panel: #ffffff;
      --accent: #0f8b8d;
      --accent-dark: #09686a;
      --warm: #d9822b;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.75;
    }

    a {
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 750;
    }

    .site-header {
      border-bottom: 1px solid var(--line);
      background: rgba(248, 250, 247, 0.94);
      backdrop-filter: blur(18px);
    }

    .nav,
    .article {
      width: min(860px, calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 68px;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-weight: 850;
    }

    .brand-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
    }

    .article {
      padding: 58px 0 80px;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .tag {
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #47545c;
      font-size: 12px;
      font-weight: 750;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.08;
    }

    .description {
      margin-bottom: 36px;
      color: var(--muted);
      font-size: 18px;
    }

    .content {
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .content h2 {
      margin-top: 34px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      font-size: 28px;
      line-height: 1.25;
    }

    .content h2:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .content h3 {
      margin-top: 26px;
      font-size: 22px;
    }

    .content p,
    .content li {
      color: #334049;
    }

    .content img {
      max-width: 100%;
      border-radius: 8px;
    }

    .content code {
      padding: 2px 5px;
      border-radius: 6px;
      background: #eef5f3;
      color: #0b6264;
      font-family: Consolas, "SFMono-Regular", monospace;
    }

    .content pre {
      overflow-x: auto;
      padding: 16px;
      border-radius: 8px;
      background: #17232a;
      color: #e8f2ef;
    }

    .content pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }

    .back {
      display: inline-flex;
      margin-top: 28px;
    }

    @media (max-width: 620px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }

      .content {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="主导航">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">S5</span>
        <span>single5240</span>
      </a>
      <a href="{{ '/' | relative_url }}#articles">返回文章列表</a>
    </nav>
  </header>

  <main class="article">
    <div class="article-meta">
      {% if page.category %}
      <span class="tag">{{ page.category }}</span>
      {% endif %}
      {% for tag in page.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
      {% if page.date %}
      <span class="tag">{{ page.date | date: "%Y-%m-%d" }}</span>
      {% endif %}
    </div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="description">{{ page.description }}</p>
    {% endif %}
    <article class="content">
      {{ content }}
    </article>
    <a class="back" href="{{ '/' | relative_url }}#articles">返回文章列表</a>
  </main>
</body>
</html>
